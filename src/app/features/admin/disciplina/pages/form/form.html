<section class="page">
  <header class="page-header">
    <div>
      <h2>Cadastro de Disciplina</h2>
      <p class="subtitle">Cadastre disciplinas e relacione com a escola responsável.</p>
    </div>
  </header>

  @if (errorMessage) {
    <p class="feedback feedback-error">{{ errorMessage }}</p>
  }

  <form class="card form-grid" (ngSubmit)="salvar()">
    <label class="field">
      Sigla
      <input [(ngModel)]="sigla" name="sigla" placeholder="POO" />
      @if (fieldErrors['sigla']) {
        <small class="feedback feedback-error">{{ fieldErrors['sigla'] }}</small>
      }
    </label>

    <label class="field field--full">
      Descrição
      <input [(ngModel)]="descricao" name="descricao" placeholder="Programação Orientada a Objetos" />
      @if (fieldErrors['descricao']) {
        <small class="feedback feedback-error">{{ fieldErrors['descricao'] }}</small>
      }
    </label>

    <label class="field">
      Carga horária
      <input [(ngModel)]="cargaHoraria" name="cargaHoraria" type="number" placeholder="80" />
      @if (fieldErrors['cargaHoraria']) {
        <small class="feedback feedback-error">{{ fieldErrors['cargaHoraria'] }}</small>
      }
    </label>

    <label class="field">
      Escola
      <select [(ngModel)]="escolaId" name="escolaId">
        <option [ngValue]="0">Selecione uma escola</option>
        @for (escola of escolaOptions; track escola.id) {
          <option [ngValue]="escola.id">{{ escola.nome }}</option>
        }
      </select>
      @if (fieldErrors['escolaId']) {
        <small class="feedback feedback-error">{{ fieldErrors['escolaId'] }}</small>
      }
    </label>

    <label class="field">
      Status
      <select [(ngModel)]="status" name="status">
        <option value="ATIVO">ATIVO</option>
        <option value="INATIVO">INATIVO</option>
        <option value="ENCERRADO">ENCERRADO</option>
      </select>
    </label>

    <div class="actions field--full">
      <button class="btn btn-primary" type="submit">Salvar</button>
      <a class="btn btn-ghost" routerLink="/admin/disciplina">Voltar</a>
    </div>
  </form>
</section>
