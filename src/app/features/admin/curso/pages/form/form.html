<section class="page">
	<header class="page-header">
		<div>
			<h2>Cadastro de Curso</h2>
			<p class="subtitle">Defina turno, coordenação e vínculo com escola.</p>
		</div>
	</header>

	@if (errorMessage) {
		<p class="feedback feedback-error">{{ errorMessage }}</p>
	}

	<form class="card form-grid" (ngSubmit)="salvar()">
		<label class="field">
			Sigla
			<input [(ngModel)]="sigla" name="sigla" placeholder="ADS" />
			@if (fieldErrors['sigla']) {
				<small class="feedback feedback-error">{{ fieldErrors['sigla'] }}</small>
			}
		</label>

		<label class="field">
			Descrição
			<input [(ngModel)]="descricao" name="descricao" placeholder="Análise e Desenvolvimento de Sistemas" />
			@if (fieldErrors['descricao']) {
				<small class="feedback feedback-error">{{ fieldErrors['descricao'] }}</small>
			}
		</label>

		<label class="field field--full">
			Coordenador
			<input [(ngModel)]="coordenador" name="coordenador" placeholder="Nome do coordenador" />
			@if (fieldErrors['coordenador']) {
				<small class="feedback feedback-error">{{ fieldErrors['coordenador'] }}</small>
			}
		</label>

		<label class="field">
			Turno
			<select [(ngModel)]="turno" name="turno">
				<option value="MATUTINO">MATUTINO</option>
				<option value="VESPERTINO">VESPERTINO</option>
				<option value="NOTURNO">NOTURNO</option>
				<option value="INTEGRAL">INTEGRAL</option>
			</select>
		</label>

		<label class="field">
			Escola
			<select [(ngModel)]="escolaId" name="escolaId">
				<option [ngValue]="0">Selecione uma escola</option>
				@for (escola of escolaOptions; track escola.id) {
					<option [ngValue]="escola.id">{{ escola.nome }}</option>
				}
			</select>
			@if (fieldErrors['escolaId']) {
				<small class="feedback feedback-error">{{ fieldErrors['escolaId'] }}</small>
			}
		</label>

		<label class="field">
			Status
			<select [(ngModel)]="status" name="status">
				<option value="ATIVO">ATIVO</option>
				<option value="INATIVO">INATIVO</option>
				<option value="ENCERRADO">ENCERRADO</option>
			</select>
		</label>

		<div class="actions field--full">
			<button class="btn btn-primary" type="submit">Salvar</button>
			<a class="btn btn-ghost" routerLink="/admin/curso">Voltar</a>
		</div>
	</form>
</section>
